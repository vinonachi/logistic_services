<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Plan</title>
    <link rel="stylesheet" href="get_plan style.css">
</head>
<body>
    <div class="container">
        <h1>Choose Your Plan</h1>
        <div class="plans">
            <div class="plan">
                <h2>Basic</h2>
                <p>$10 / month</p>
                <button onclick="subscribe('basic')">Choose Plan</button>
            </div>
            <div class="plan">
                <h2>premium</h2>
                <p>$20 / month</p>
                <button onclick="subscribe('standard')">Choose Plan</button>
            </div>
            <div class="plan">
                <h2>Bussiness</h2>
                <p>$30 / month</p>
                <button onclick="subscribe('premium')">Choose Plan</button>
            </div>
        </div>
    </div>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="script.js"></script>
</body>
</html>
